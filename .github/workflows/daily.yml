name: Food Innovation Daily Report

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Setup env
        run: |
          cat > .env << 'EOF'
          FEISHU_MODE=${{ secrets.FEISHU_MODE }}
          FEISHU_APP_ID=${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET=${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_OPEN_ID=${{ secrets.FEISHU_USER_OPEN_ID }}
          DATABASE_PATH=data/food_news.db
          LOG_LEVEL=INFO
          EOF

      - name: Run report
        run: python main.py
